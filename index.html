<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Great+Vibes&family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Kumbh+Sans:wght,YOPQ@100..900,300&family=Libre+Baskerville:ital,wght@0,400..700;1,400..700&family=Libre+Bodoni:ital,wght@0,400..700;1,400..700&family=Parisienne&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="styles.css">
  <title>Frontend Mentor | Fylo data storage component</title>
</head>

<body>
  <main>
    <div class="file-container">
      <img class="logo" src="./images/logo.svg" alt="logo">
      <div class="file-buttons">
        <button><img class="document" src="./images/icon-document.svg" alt="document icon"></button>
        <button><img src="./images/icon-folder.svg" alt="folder icon"></button>
        <button><img src="./images/icon-upload.svg" alt="upload icon"></button>
      </div>
    </div>

    <div class="storage-card">
      <p>You’ve used <strong>815 GB</strong> of your storage</p>
      <div class="remaining-storage">
        <span class="remaining-gig">185</span>GB Left
      </div>
      <progress class="storage-bar" value="815" max="1000">
      </progress>
      <div class="storage-used">
        <span class="storage-used-text">0 GB</span>
        <span class="storage-used-text">1000 GB</span>
      </div>
    </div>
  </main>
</body>

</html>
